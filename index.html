<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match the Following</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1 id="game-title">Match the Following</h1>
        <p id="game-instruction" class="instruction">Tap an item on the left, then tap its match on the right to pair them up.</p>

        <div class="match-box">
            <div class="column" id="left-column"></div>
            <div class="column" id="right-column"></div>
        </div>

        <div class="action-area">
            <button id="submit-btn" class="btn hidden">Submit Answers</button>
            <div id="result-message" class="result-text hidden"></div>
            <button id="reset-btn" class="btn btn-secondary hidden">Try Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
